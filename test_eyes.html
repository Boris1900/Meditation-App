<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Augen-Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1a1a;
    }

    /* Layer 1: Hintergrundbild – immer sichtbar */
    #bg-base {
      position: fixed;
      inset: 0;
      background: url('background.jpg') center center / cover no-repeat;
      z-index: 0;
    }

    /* Layer 2: Lächeln-Bild */
    #bg-eyes {
      position: fixed;
      inset: 0;
      background: url('background_laecheln_v0.4.jpg') center center / cover no-repeat;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }

    /* Layer 3: Goldener Heiligenschein – Kreis um Kopf, unterer Teil fast unsichtbar */
    #buddha-aura {
      position: fixed;
      left: 28%;
      top: 59%;
      width: 180px;
      height: 180px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle,
        transparent               0%,
        transparent              40%,
        rgba(255, 230, 80, 0.08) 45%,
        rgba(255, 220, 70, 0.35) 50%,
        rgba(255, 210, 60, 0.60) 55%,
        rgba(255, 200, 50, 0.55) 60%,
        rgba(255, 185, 35, 0.25) 68%,
        rgba(255, 170, 25, 0.08) 77%,
        transparent              88%);
      /* Obere Hälfte voll sichtbar, untere Hälfte (vor Körper) 95% transparent */
      -webkit-mask-image: linear-gradient(to bottom,
        black        0%,
        black       58%,
        rgba(0,0,0,0.20) 78%,
        transparent  92%);
      mask-image: linear-gradient(to bottom,
        black        0%,
        black       58%,
        rgba(0,0,0,0.20) 78%,
        transparent  92%);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    #info {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0,0,0,0.6);
      color: #d4a853;
      font-family: Georgia, serif;
      font-size: 0.9rem;
      padding: 10px 18px;
      border-radius: 10px;
      text-align: center;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 12px;
    }

    button {
      background: rgba(180,120,50,0.3);
      border: 1px solid rgba(180,120,50,0.6);
      color: #d4a853;
      font-family: Georgia, serif;
      font-size: 0.9rem;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="bg-base"></div>
  <div id="bg-eyes"></div>
  <div id="buddha-aura"></div>

  <div id="info">Startet in 3 Sek. …</div>

  <div id="controls">
    <button onclick="triggerEyes()">Jetzt auslösen</button>
    <button onclick="toggleAuto()" id="auto-btn">Auto: EIN</button>
  </div>

  <script>
    const bgEyes  = document.getElementById('bg-eyes');
    const aura    = document.getElementById('buddha-aura');
    const info    = document.getElementById('info');
    const autoBtn = document.getElementById('auto-btn');

    let autoOn    = true;
    let autoTimer = null;
    let busy      = false;

    function triggerEyes() {
      if (busy) return;
      busy = true;

      // Lächeln + Aura einblenden (1.5s Fade-in)
      bgEyes.style.opacity = '1';
      aura.style.opacity   = '1';
      info.textContent = 'Einblenden …';

      setTimeout(() => {
        info.textContent = 'Buddha lächelt (5 Sek.)';
      }, 1500);

      // Nach 1.5s + 5s = 6.5s ausblenden
      setTimeout(() => {
        bgEyes.style.opacity = '0';
        aura.style.opacity   = '0';
        info.textContent = 'Ausblenden …';
      }, 6500);

      // 1.5s Fade-out → gesamt ~8s
      setTimeout(() => {
        info.textContent = 'Nächster Zyklus in ~8 Sek.';
        busy = false;
      }, 8000);
    }

    function scheduleNext() {
      if (!autoOn) return;
      const delay = 8000; // Testmodus: 8 Sek.
      autoTimer = setTimeout(() => {
        triggerEyes();
        scheduleNext();
      }, delay);
    }

    function toggleAuto() {
      autoOn = !autoOn;
      if (autoOn) {
        autoBtn.textContent = 'Auto: EIN';
        scheduleNext();
      } else {
        clearTimeout(autoTimer);
        autoBtn.textContent = 'Auto: AUS';
        info.textContent = 'Manueller Modus';
      }
    }

    // Erster Zyklus nach 3 Sek.
    setTimeout(() => {
      triggerEyes();
      scheduleNext();
    }, 3000);
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Meditation Timer</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Meditation">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Dimm-Overlay -->
  <div id="overlay"></div>

  <!-- Menü: Audio-Dateien laden -->
  <div id="audio-menu" class="hidden">
    <div class="menu-content">
      <h2>Gong-Sound wählen</h2>
      <p class="menu-hint">Lade deine eigene MP3-Datei</p>
      <label class="upload-btn">
        <input type="file" id="audio-file-input" accept="audio/*">
        MP3 auswählen
      </label>
      <div id="current-audio-name">Aktuell: Demo-Gong</div>
      <button id="use-demo-gong" class="demo-btn">Demo-Gong verwenden</button>
      <hr class="menu-divider">
      <h2>Abdunkelung</h2>
      <div class="dim-slider-row">
        <span class="dim-end-label">Keine</span>
        <input type="range" id="dim-slider" min="0" max="95" value="85" step="5">
        <span class="dim-end-label">Sehr dunkel</span>
      </div>
      <p id="dim-level-label">Stark</p>
      <button id="close-menu" class="close-btn">Schließen</button>
    </div>
  </div>

  <!-- Hauptbereich -->
  <main>

    <!-- Gong -->
    <div id="gong-container">
      <div id="gong-cord-left" class="cord"></div>
      <div id="gong-cord-right" class="cord"></div>
      <div id="gong" title="Tippen zum Starten">
        <span id="gong-label">START</span>
      </div>
    </div>

    <!-- Timer + Slider – wird per JS zwischen Gong und Nav zentriert -->
    <div id="timer-area">
      <div id="timer-display">
        <span id="timer-text">40:00</span>
      </div>
      <div id="controls">
        <div class="slider-row">
          <button class="adj-btn" id="minus-btn">−</button>
          <input type="range" id="duration-slider" min="1" max="90" value="40">
          <button class="adj-btn" id="plus-btn">+</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Navigation -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-timer" title="Timer">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M12 5V3M9 3h6M12 8v5l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <button class="nav-btn" id="nav-audio" title="Audio-Einstellungen">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>

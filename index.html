<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Meditation Timer</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Meditation">
  <link rel="apple-touch-icon" href="icon-1024.png">
  <link rel="preload" as="image" href="background.jpg">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="color-scheme" content="dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hintergrundbild: eigenes Element, Höhe per JS auf screen.height fixiert -->
  <div id="app-bg" aria-hidden="true"></div>

  <!-- Dimm-Overlay -->
  <div id="overlay"></div>

  <!-- Menü: Audio-Dateien laden -->
  <div id="audio-menu" class="hidden">
    <div class="menu-content">
      <button id="close-menu" class="menu-close-x" aria-label="Schließen">✕</button>
      <h2>Gong-Sound wählen</h2>
      <p class="menu-hint">Lade deine eigene MP3-Datei</p>
      <label class="upload-btn">
        <input type="file" id="audio-file-input" accept="audio/*">
        MP3 auswählen
      </label>
      <div id="current-audio-name">Kein Klang gewählt</div>
      <button class="demo-btn klang-btn" data-file="Sounds/Klangschale Morgenstern.mp3" data-label="Klangschale Morgenstern">Klangschale Morgenstern</button>
      <button class="demo-btn klang-btn" data-file="Sounds/Klangschale Mittagspause.mp3" data-label="Klangschale Mittagspause">Klangschale Mittagspause</button>
      <button class="demo-btn klang-btn" data-file="Sounds/Klangschale Abendrot.mp3" data-label="Klangschale Abendrot">Klangschale Abendrot</button>
      <div id="ios-mute-hint" style="display:none; background:#2a1f0a; border:1.5px solid #b47832; border-radius:10px; padding:10px 14px; font-size:12px; color:#e8c87a; line-height:1.5; margin-top:12px;">
        📱 <strong>iPhone-Nutzer:</strong> Der seitliche Stummschalter muss <strong>ausgeschaltet</strong> sein (kein orangefarbener Streifen) – sonst ist kein Ton zu hören.
      </div>
      <hr class="menu-divider">
      <h2>Abdunkelung</h2>
      <div class="dim-slider-row">
        <span class="dim-end-label">Keine</span>
        <input type="range" id="dim-slider" min="0" max="95" value="85" step="5">
        <span class="dim-end-label">Sehr dunkel</span>
      </div>
      <p id="dim-level-label">Stark</p>
      <hr class="menu-divider">
      <h2>Flammen-Schein</h2>
      <div class="dim-slider-row">
        <span class="dim-end-label">Aus</span>
        <input type="range" id="flame-slider" min="0" max="100" value="60" step="5">
        <span class="dim-end-label">Stark</span>
      </div>
      <p id="flame-level-label">Mittel</p>
      <label class="flicker-toggle">
        <input type="checkbox" id="flicker-checkbox">
        <span>Flamme flackern</span>
      </label>
      <hr class="menu-divider">
      <button id="update-btn" onclick="checkForUpdate()" class="update-btn">🔄 Auf Update prüfen</button>
      <div id="update-status"></div>
      <div id="app-version"></div>
    </div>
  </div>

  <!-- Flammen-Schein (sanftes Pulsieren um das Teelicht) -->
  <div id="flame-glow"></div>

  <!-- Flammen-Flackern (kleines Element direkt auf der Kerzenflamme) -->
  <div id="flame-flicker"></div>

  <!-- Hauptbereich -->
  <main>

    <!-- Gong -->
    <div id="gong-container">
      <div id="gong-cord-left" class="cord"></div>
      <div id="gong-cord-right" class="cord"></div>
      <div id="gong" title="Tippen zum Starten">
        <span id="gong-label">START</span>
      </div>
    </div>

    <!-- Timer + Slider – wird per JS zwischen Gong und Nav zentriert -->
    <div id="timer-area">
      <div id="timer-display">
        <span id="timer-text">40:00</span>
      </div>
      <div id="controls">
        <div class="slider-row">
          <button class="adj-btn" id="minus-btn">−</button>
          <input type="range" id="duration-slider" min="1" max="90" value="40">
          <button class="adj-btn" id="plus-btn">+</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Navigation -->
  <nav id="bottom-nav">
    <button class="nav-btn" id="nav-audio" title="Sound &amp; Abdunkelung">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
